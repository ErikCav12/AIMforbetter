server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/png image/x-icon;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|ico|jpg|jpeg|gif|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
